<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // 单页应用 GitHub Pages 404 重定向脚本
    // 适配子路径部署：/psych_site/ → pathSegmentsToKeep = 1
    (function() {
      var segmentCount = 1; // 保留 1 段路径（/psych_site/）
      var l = window.location;
      var pathSegments = l.pathname.split('/').filter(function(p) { return p.length > 0; });
      var newPath = '';
      for (var i = 0; i < segmentCount && i < pathSegments.length; i++) {
        newPath += '/' + pathSegments[i];
      }
      newPath += '/#/' + l.pathname.slice((newPath.length + 1)) + l.search + l.hash;
      l.replace(l.origin + newPath);
    })();
  </script>
</head>
<body>
  正在跳转...
</body>
</html>
