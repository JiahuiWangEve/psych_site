<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 衍生测试集合 - 蓬草心理社</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#49703B',
            secondary: '#d6e9dc',
            muted: '#e8f0eb',
          },
        },
      }
    }
  </script>
  <style>
    body {
      background-color: #f8f8f4;
    }
    .card {
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: all 300ms ease-in-out;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .nav-link {
      padding: 8px 16px;
      border-radius: 9999px;
      border: 2px solid transparent;
      transition: all 300ms ease-in-out;
    }
    .nav-link:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }
    .nav-link.active {
      background-color: white;
      color: #49703B;
      font-weight: 500;
      border-color: white;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    .mobile-nav-link {
      display: block;
      padding: 12px 16px;
      border-radius: 12px;
      transition: background-color 150ms ease-in-out;
    }
    .mobile-nav-link:hover {
      background-color: #d6e9dc;
    }
    .mobile-nav-link.active {
      background-color: #d6e9dc;
      color: #49703B;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="sticky top-0 z-50 w-full">
    <div class="bg-primary/90 backdrop-blur-xl text-white shadow-sm">
      <div class="container mx-auto px-4 py-3">
        <div class="flex items-center justify-between">
          <a href="../" class="flex items-center gap-3">
            <img src="../website_images/logo.png" alt="蓬草心理社" class="w-8 h-8 object-contain rounded">
            <span class="font-semibold text-lg">蓬草心理社</span>
          </a>
          <!-- Desktop Menu -->
          <nav class="hidden lg:flex items-center gap-2">
            <a href="../" class="nav-link">首页</a>
            <a href="../mbti/" class="nav-link active">MBTI衍生测试</a>
            <a href="../resources/" class="nav-link">心理学资源分享</a>
            <a href="../about/" class="nav-link">关于社团</a>
          </nav>
          <!-- Mobile Menu Button -->
          <button 
            class="lg:hidden p-2 rounded-full hover:bg-white/20 transition-colors"
            onclick="toggleMobileMenu()"
          >
            <i class="fa-solid fa-bars w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div 
      id="mobile-overlay"
      class="fixed inset-0 bg-black/20 backdrop-blur-sm lg:hidden hidden z-40"
      onclick="toggleMobileMenu()"
    ></div>

    <!-- Mobile Sidebar -->
    <div 
      id="mobile-sidebar"
      class="fixed top-0 right-0 h-full w-[75vw] max-w-[320px] bg-white/95 backdrop-blur-xl shadow-2xl transition-transform duration-300 translate-x-full lg:hidden z-50"
    >
      <div class="p-6">
        <div class="flex items-center justify-between mb-8">
          <span class="font-semibold text-lg text-gray-800">菜单</span>
          <button
            class="p-2 rounded-full hover:bg-gray-100 transition-colors"
            onclick="toggleMobileMenu()"
          >
            <i class="fa-solid fa-xmark w-5 h-5"></i>
          </button>
        </div>
        <nav class="flex flex-col gap-2">
          <a href="../" class="mobile-nav-link" onclick="toggleMobileMenu()">首页</a>
          <a href="../mbti/" class="mobile-nav-link active" onclick="toggleMobileMenu()">MBTI衍生测试</a>
          <a href="../resources/" class="mobile-nav-link" onclick="toggleMobileMenu()">心理学资源分享</a>
          <a href="../about/" class="mobile-nav-link" onclick="toggleMobileMenu()">关于社团</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <h1 class="text-3xl lg:text-4xl font-bold text-gray-800 mb-4">
        MBTI 衍生测试集合
      </h1>
      <p class="text-gray-600 mb-6">
        收集了各种流行的 MBTI 及其衍生人格测试，点击卡片即可跳转
      </p>

      <!-- 筛选器 -->
      <div class="inline-flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
        <label for="type-filter" class="text-gray-700 font-medium">
          按类型筛选：
        </label>
        <select id="type-filter" onchange="filterList()" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="all">全部 (<span id="total-count">0</span>)</option>
        </select>
      </div>
    </div>

    <div id="test-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- 测试列表通过 JS 动态生成 -->
    </div>

    <div id="empty-state" class="hidden text-center py-20 text-gray-500">
      没有找到该类型的测试 😕
    </div>

    <!-- 投稿按钮放在底部 -->
    <div class="flex flex-wrap justify-center gap-4 mt-12">
      <a
        href="https://docs.qq.com/form/page/DZnNDVkN4UExEYnNF"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center gap-2 px-6 py-3 bg-gray-500 text-white rounded-full hover:bg-gray-600 transition-colors font-medium shadow-sm hover:shadow"
      >
        <span>➕</span>
        投稿新的 MBTI 变体测试
      </a>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-12 py-6">
    <div class="container mx-auto px-4 text-center text-gray-500">
      <p>© <span id="year"></span> 蓬草心理社. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // MBTI 测试数据
    const mbtiList = [
      {
        id: 1,
        name: "官网 16Personalities",
        description: "最经典的原版 MBTI 测试",
        type: "总体人格",
        url: "https://16personalities.org.cn/"
      },
      {
        id: 2,
        name: "SBTI 星空社",
        description: "更详细的功能二分法测试",
        type: "总体人格",
        url: "https://sbti.dev/test"
      },
      {
        id: 3,
        name: "CPTI 认知功能测试",
        description: "专门测八方位认知功能",
        type: "细分领域",
        url: "#小程序://CPTI测试/jksA3Rz4MPLm4Uh"
      },
      {
        id: 4,
        name: "C-BTI 认知行为测试",
        description: "基于认知行为类型的测试",
        type: "细分领域",
        url: "https://cbti.codefather.cn/"
      },
      {
        id: 5,
        name: "荣格八维测试",
        description: "经典的荣格八维测试",
        type: "细分领域",
        url: "https://www.apesk.com/jungtest/"
      },
      {
        id: 6,
        name: "浪漫偏好测试",
        description: "测你在亲密关系中的浪漫偏好",
        type: "细分领域",
        url: "https://sakinorva.net/test/romantic_preferences"
      },
      {
        id: 7,
        name: "你是什么蛋糕",
        description: "娱乐向测试，看看你对应哪种蛋糕",
        type: "娱乐玩梗",
        url: "https://www.cake.me/personality-test/what-cake-r-u-pro?locale=zh-CN"
      },
      {
        id: 8,
        name: "SDTI 自我识别测试",
        description: "帮助你自我识别人格类型的测试",
        type: "总体人格",
        url: "https://sdtis.com/"
      },
      {
        id: 9,
        name: "TestUrText",
        description: "文字类型测试，通过文字判断你的类型",
        type: "细分领域",
        url: "https://testurtext.us/index.html"
      },
      {
        id: 10,
        name: "GovernaTor 的八维测试",
        description: "开源的八维功能测试",
        type: "细分领域",
        url: "https://gouvernathor.github.io/zh_CN/"
      },
      {
        id: 11,
        name: "ACGTI 另类认知测试",
        description: "另一种角度的认知功能测试",
        type: "细分领域",
        url: "https://acgti.tianxingleo.top/#/"
      },
      {
        id: 12,
        name: "鸟类分类测试",
        description: "把人分成四种鸟类的娱乐测试",
        type: "娱乐玩梗",
        url: "https://xiaohao934.github.io/birdtest/"
      },
      {
        id: 13,
        name: "ABTI 天赋本能测试",
        description: "基于天赋本能的类型测试",
        type: "总体人格",
        url: "https://abti.fun/"
      },
      {
        id: 14,
        name: "疾病污名化认知问卷",
        description: "心理测量问卷",
        type: "细分领域",
        url: "https://healthbigdata.wjx.cn/m/69635824.aspx"
      },
      {
        id: 15,
        name: "IAT 内隐联想测验",
        description: "经典的内隐态度测量",
        type: "细分领域",
        url: "https://implicit.harvard.edu/implicit/china"
      },
      {
        id: 16,
        name: " GD七维度测试",
        description: "七个维度的人格测试",
        type: "总体人格",
        url: "https://minke8.cn/gd7.html"
      }
    ];

    // 获取所有不重复的类型
    function getTypes() {
      const typeSet = new Set();
      mbtiList.forEach(test => typeSet.add(test.type));
      return ['all', ...Array.from(typeSet)];
    }

    // 初始化筛选下拉框
    function initFilter() {
      const select = document.getElementById('type-filter');
      const types = getTypes();
      types.forEach(type => {
        if (type === 'all') {
          document.getElementById('total-count').textContent = mbtiList.length;
        } else {
          const count = mbtiList.filter(t => t.type === type).length;
          const option = document.createElement('option');
          option.value = type;
          option.textContent = type + ' (' + count + ')';
          select.appendChild(option);
        }
      });
    }

    // 获取类型颜色样式
    function getTypeColor(type) {
      const colorMap = {
        '总体人格': { bg: 'rgba(59, 130, 246, 0.1)', text: 'rgb(30, 64, 175)' },
        '娱乐玩梗': { bg: 'rgba(244, 114, 182, 0.1)', text: 'rgb(190, 24, 93)' },
        '细分领域': { bg: 'rgba(34, 197, 94, 0.1)', text: 'rgb(21, 128, 61)' },
      };
      return colorMap[type] || { bg: 'rgba(107, 114, 128, 0.1)', text: 'rgb(75, 85, 99)' };
    }

    // 渲染列表
    function renderList(filteredList) {
      const container = document.getElementById('test-list');
      const emptyState = document.getElementById('empty-state');
      container.innerHTML = '';

      if (filteredList.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      } else {
        emptyState.classList.add('hidden');
      }

      filteredList.forEach(test => {
        const card = document.createElement('a');
        card.href = test.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'card';
        const color = getTypeColor(test.type);
        card.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <h3 class="text-xl font-semibold text-gray-800">${test.name}</h3>
            <i class="fa-solid fa-external-link-alt w-4 h-4 text-gray-400 flex-shrink-0"></i>
          </div>
          <p class="text-gray-600 mb-4">${test.description}</p>
          <div class="flex items-center">
            <span class="inline-block px-3 py-1 rounded-full text-sm font-medium" style="background-color: ${color.bg}; color: ${color.text};">
              ${test.type}
            </span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 筛选
    function filterList() {
      const select = document.getElementById('type-filter');
      const selectedType = select.value;
      let filteredList = mbtiList;
      if (selectedType !== 'all') {
        filteredList = mbtiList.filter(test => test.type === selectedType);
      }
      renderList(filteredList);
    }

    // 初始化
    initFilter();
    renderList(mbtiList);

    // 移动端菜单
    function toggleMobileMenu() {
      const overlay = document.getElementById('mobile-overlay');
      const sidebar = document.getElementById('mobile-sidebar');
      overlay.classList.toggle('hidden');
      sidebar.classList.toggle('translate-x-full');
    }
  </script>
</body>
</html>
