<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // 单页应用 GitHub Pages 404 重定向脚本
    // 适配子路径部署：/psych_site/ → 保留 1 段路径
    (function() {
      // 对于 /psych_site/mbti，我们需要重定向到 /psych_site/#/mbti
      var segmentsToKeep = 1;
      var location = window.location;
      var path = location.pathname;
      var segments = path.split('/').filter(s => s.length > 0);
      
      var base = '';
      for (var i = 0; i < segmentsToKeep && i < segments.length; i++) {
        base += '/' + segments[i];
      }
      
      var remainingPath = '';
      for (var j = segmentsToKeep; j < segments.length; j++) {
        remainingPath += (remainingPath ? '/' : '') + segments[j];
      }
      
      var newUrl = location.origin + base + '/#' + (remainingPath ? '/' + remainingPath : '') + location.search + location.hash;
      location.replace(newUrl);
    })();
  </script>
</head>
<body>
  正在跳转...
</body>
</html>
